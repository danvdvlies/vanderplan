{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sign in · Vanderplan Budget</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="{% static 'css/app.css' %}">
</head>
<body class="d-flex align-items-center" style="min-height:100vh;">
  <div class="container" style="max-width:420px;">
    <div class="text-center mb-4">
      <h1 class="h3"><i class="bi bi-piggy-bank text-primary"></i> Vanderplan</h1>
      <p class="text-muted">Zero-based budgeting</p>
    </div>
    <div class="card">
      <div class="card-body p-4">
        <h2 class="h5 mb-3">Sign in</h2>
        {% if form.errors %}
          <div class="alert alert-danger">Your username and password didn't match. Please try again.</div>
        {% endif %}
        <form method="post">
          {% csrf_token %}
          <div class="mb-3">
            <label class="form-label" for="id_username">Username</label>
            <input type="text" name="username" id="id_username" class="form-control" autofocus required>
          </div>
          <div class="mb-3">
            <label class="form-label" for="id_password">Password</label>
            <input type="password" name="password" id="id_password" class="form-control" required>
          </div>
          <button type="submit" class="btn btn-primary w-100">Sign in</button>
          <input type="hidden" name="next" value="{{ next }}">
        </form>
        <p class="text-center small mt-3 mb-0"><a href="{% url 'password_reset' %}">Forgot password?</a></p>
        {% if allow_registration %}
        <p class="text-center text-muted small mt-3 mb-0">
          New here? <a href="{% url 'register' %}">Create an account</a>
        </p>
        {% endif %}
      </div>
    </div>
  </div>
</body>
</html>
