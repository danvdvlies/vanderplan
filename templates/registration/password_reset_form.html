{% extends "registration/auth_base.html" %}
{% block title %}Reset password · Vanderplan{% endblock %}
{% block content %}
<h2 class="h5 mb-3">Reset your password</h2>
<p class="text-muted small">Enter your account email and we'll send a reset link.</p>
<form method="post">
  {% csrf_token %}
  <div class="mb-3">
    <label class="form-label" for="id_email">Email</label>
    <input type="email" name="email" id="id_email" class="form-control" required autofocus>
  </div>
  <button type="submit" class="btn btn-primary w-100">Send reset link</button>
</form>
<p class="text-center small mt-3 mb-0"><a href="{% url 'login' %}">Back to sign in</a></p>
{% endblock %}
